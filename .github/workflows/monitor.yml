name: monitor

on:
  schedule:
    # 12:00 UTC = 09:00 BRT  → modo "alert" (notificações ao vivo)
    # 21:00 UTC = 18:00 BRT  → modo "digest" (resumo do dia, 4 seções)
    - cron: "0 12,21 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de notificação"
        required: false
        default: "alert"
        type: choice
        options: [alert, digest]

# Evita que dois runs simultâneos tentem commitar o DB ao mesmo tempo.
concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Adidas Netshoes sozinho leva ~4min (164 páginas × 1.5s) — 20min dá margem.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar dependências
        # Centauro é pulada (Akamai bloqueia IPs do runner) — sem Playwright.
        run: |
          python -m pip install --upgrade pip
          pip install "httpx>=0.27,<0.28" "selectolax>=0.3.21"

      - name: Decidir modo (alert/digest)
        id: pick_mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            mode="${{ inputs.mode }}"
          else
            # Cron: 12h UTC → alert, 21h UTC → digest. Se hora não bater, alert.
            hour=$(date -u +%H)
            if [ "$hour" = "21" ]; then mode="digest"; else mode="alert"; fi
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Mode escolhido: $mode (hora UTC=$(date -u +%H))"

      - name: Capturar revisão do DB antes do run
        id: db_before
        run: |
          if [ -f data/prices.db ]; then
            echo "hash=$(sha256sum data/prices.db | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: "Rodar monitor (ÖUS + BaW — site próprio + Clube Netshoes)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PYTHONPATH=src python -m ous_monitor.cli run \
            --sources ous netshoes baw netshoes_baw netshoes_adidas \
            --mode "${{ steps.pick_mode.outputs.mode }}"

      - name: Commitar DB se houve mudança
        run: |
          new_hash=$(sha256sum data/prices.db | cut -d' ' -f1)
          if [ "$new_hash" = "${{ steps.db_before.outputs.hash }}" ]; then
            echo "DB inalterado — nada a commitar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.db
          git commit -m "chore(data): snapshot ${{ steps.pick_mode.outputs.mode }} $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
