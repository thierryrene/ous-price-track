name: snapshot

# Disparado MANUALMENTE via Actions → snapshot → Run workflow.
# Diferente de `monitor`: ignora o filtro "já notificou" e envia digest com
# TODOS os produtos atualmente em promoção (mantém filtro de tamanhos 42/43).
on:
  workflow_dispatch: {}

# Compartilha lock com `monitor` pra evitar push concorrente do data/prices.db.
concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Adidas Netshoes sozinho leva ~4min (164 páginas × 1.5s) — 20min dá margem.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install "httpx>=0.27,<0.28" "selectolax>=0.3.21"

      - name: Capturar revisão do DB antes do run
        id: db_before
        run: |
          if [ -f data/prices.db ]; then
            echo "hash=$(sha256sum data/prices.db | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: "Snapshot completo (fontes compatíveis com GitHub Actions)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PYTHONPATH=src python -m ous_monitor.cli snapshot \
            --sources ous umbro netshoes baw netshoes_baw netshoes_adidas netshoes_adidas_originals

      - name: Commitar DB se houve mudança
        run: |
          new_hash=$(sha256sum data/prices.db | cut -d' ' -f1)
          if [ "$new_hash" = "${{ steps.db_before.outputs.hash }}" ]; then
            echo "DB inalterado — nada a commitar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.db
          git commit -m "chore(data): snapshot manual $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
